version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pifagor
      POSTGRES_USER: pifagor
      POSTGRES_PASSWORD: pifagor_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pifagor -d pifagor"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    command: >
      sh -c "python wait_for_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/workspace/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pifagor:pifagor_pass@db:5432/pifagor
      SECRET_KEY: super-secret-key-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      # Email parsing (set these to enable daily EasyPay receipt processing)
      EMAIL_IMAP_HOST: imap.gmail.com
      EMAIL_IMAP_PORT: "993"
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""
      LESSON_PRICE: "80"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
